<style>
    body {
        margin: 0;
        width: 100vw;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background: #000;
        overflow: hidden;
    }

    .character {
        width: 290px; /* Width of one frame */
        height: 260px; /* Height of one frame */

        background-image: url("axolotl.png");
        background-repeat: no-repeat;
        background-position: 0 0;

        cursor: pointer;
    }

    .play {
        animation: spriteAnim 0.56s steps(7) 1;
    }

    @keyframes spriteAnim {
        from {
            background-position: 0 0;
        }
        to {
            background-position: -2030px 0;
        }
    }
</style>
