<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axolotl Anniversary</title>
    <style>
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .character {
            width: 290px; /* Width of one frame */
            height: 260px; /* Height of one frame */

            background-image: url("axolotl.png");
            background-repeat: no-repeat;
            background-position: 0 0;

            cursor: pointer;
            transition: transform 0.1s;
        }

        .character:active {
            transform: scale(0.95);
        }

        .play {
            animation: spriteAnim 0.56s steps(7) 1;
        }

        @keyframes spriteAnim {
            from {
                background-position: 0 0;
            }
            to {
                background-position: -2030px 0;
            }
        }

        .progress-bar-container {
            width: 300px;
            height: 30px;
            background-color: #333;
            border: 2px solid #666;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff1493, #ff69b4);
            transition: width 0.05s linear;
            box-shadow: 0 0 10px #ff1493;
        }

        .progress-text {
            color: #fff;
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.7;
        }

        .difficulty-indicator {
            color: #fff;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.5;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(var(--tx));
                opacity: 0;
            }
        }

        .heart-burst {
            position: fixed;
            top: 50%;
            left: 50%;
            font-size: 60px;
            pointer-events: none;
            animation: heartFloat 2s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="character" id="axolotl"></div>
        <div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">Click the axolotl!</div>
            <div class="difficulty-indicator" id="difficultyText"></div>
        </div>
    </div>

    <script>
        const axolotl = document.getElementById('axolotl');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const difficultyText = document.getElementById('difficultyText');

        let progress = 0;
        const maxProgress = 100;
        let baseRillRate = 5;
        const baseDrainRate = 1;

        let isPressed = false;

        // Mouse events
        axolotl.addEventListener('mousedown', () => {
            isPressed = true;
            axolotl.classList.add('play');
        });

        document.addEventListener('mouseup', () => {
            isPressed = false;
        });

        // Touch events for mobile
        axolotl.addEventListener('touchstart', () => {
            isPressed = true;
            axolotl.classList.add('play');
        });

        document.addEventListener('touchend', () => {
            isPressed = false;
        });

        function getDynamicDifficulty() {
            // Difficulty increases as progress approaches 100
            // At 0%: fillRate = 5, drainRate = 1
            // At 50%: fillRate = 3, drainRate = 2
            // At 90%: fillRate = 1, drainRate = 3
            // At 100%: Can't progress further
            
            const difficulty = progress / 100;
            const fillRate = Math.max(1, baseRillRate - (difficulty * 4));
            const drainRate = Math.min(4, baseDrainRate + (difficulty * 3));
            
            return { fillRate, drainRate };
        }

        function updateDifficultyText() {
            if (progress < 25) {
                difficultyText.textContent = '🟢 Easy';
            } else if (progress < 50) {
                difficultyText.textContent = '🟡 Medium';
            } else if (progress < 75) {
                difficultyText.textContent = '🟠 Hard';
            } else {
                difficultyText.textContent = '🔴 Extreme';
            }
        }

        function createHeartBurst() {
            // Create multiple hearts that float upward
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-burst');
                heart.textContent = '❤️';
                heart.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                heart.style.left = (50 + (Math.random() - 0.5) * 100) + 'vw';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 2000);
            }
        }

        function triggerCelebration() {
            // Create heart burst effect
            createHeartBurst();
            
            // After hearts animation, redirect to celebration page
            setTimeout(() => {
                window.location.href = 'celebration.html';
            }, 1000);
        }

        // Animation loop
        function update() {
            const { fillRate, drainRate } = getDynamicDifficulty();

            if (isPressed && progress < maxProgress) {
                progress = Math.min(progress + fillRate, maxProgress);
            } else if (!isPressed) {
                progress = Math.max(progress - drainRate, 0);
            }

            progressBar.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
            updateDifficultyText();

            // Check if progress reached 100%
            if (progress >= maxProgress) {
                triggerCelebration();
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
