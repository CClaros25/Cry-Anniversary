<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration!</title>
    <style>
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #1a0033, #330066, #1a0033);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .celebration-container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            animation: pulse 1s ease-in-out infinite;
        }

        .text-content {
            font-size: 1.3rem;
            line-height: 1.8;
            margin: 30px 0;
            opacity: 0.95;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.8);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes flowerFloat {
            0% {
                transform: translateY(100vh) rotateZ(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotateZ(360deg);
                opacity: 0;
            }
        }

        .flower {
            position: fixed;
            font-size: 50px;
            pointer-events: none;
            animation: flowerFloat 6s ease-in-out forwards;
        }

        .flower-left {
            left: 10vw;
        }

        .flower-right {
            right: 10vw;
        }
    </style>
</head>
<body>
    <div class="celebration-container">
        <h1>Happy Anniversary! 🎉</h1>
        <div class="text-content">
            <p>You made it! You filled the love meter all the way up!</p>
            <p>Thank you for being the best. I love you so much! ❤️</p>
        </div>
        <button class="restart-btn" onclick="location.href='index.html'">Try Again</button>
    </div>

    <script>
        // Create floating flowers on sides
        function createFlower() {
            const flowers = ['🌸', '🌺', '🌼', '🌻', '🌷'];
            const randomFlower = flowers[Math.floor(Math.random() * flowers.length)];
            
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.textContent = randomFlower;
            
            // Randomly choose left or right side
            if (Math.random() > 0.5) {
                flower.classList.add('flower-left');
                flower.style.left = (5 + Math.random() * 10) + 'vw';
            } else {
                flower.classList.add('flower-right');
                flower.style.right = (5 + Math.random() * 10) + 'vw';
            }
            
            document.body.appendChild(flower);
            
            setTimeout(() => flower.remove(), 6000);
        }

        // Create flowers continuously
        createFlower();
        setInterval(createFlower, 800);
    </script>
</body>
</html>
